<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ROCKS AI</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">

    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- Header -->
<header id="top-bar">

    <div class="brand">
        ⚡ <span>ROCKS AI</span>
    </div>

    <div class="top-divider"></div>

    <span class="top-label">Modelo</span>

    <select id="model-select">
        <option>qwen2.5:7b</option>
    </select>

    <div class="top-divider"></div>

    <div id="status-container">
        <div id="status-dot"></div>
        <span id="status-text">Online</span>
    </div>

</header>

<!-- App -->
<div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">

        <div class="sidebar-head">
            <button id="new-chat-btn">＋ Novo Chat</button>
        </div>

        <div id="chat-list">

            <div class="chat-item active">
                <span class="chat-icon">💬</span>
                <span class="chat-title">Conversa Atual</span>
            </div>

        </div>

    </aside>


    <!-- Main -->
    <main id="main">

        <!-- Chat -->
        <section id="chat-box">

            <div class="welcome">
                <h2>ROCKS AI</h2>
                <p>
                    Olá! Eu sou seu assistente virtual.<br>
                    Como posso ajudar hoje?
                </p>
            </div>

        </section>


        <!-- Input -->
        <section id="input-zone">

            <div class="input-row">

                <button id="attach-btn">📎</button>

                <textarea
                    id="msg-input"
                    rows="1"
                    placeholder="Digite sua mensagem..."
                ></textarea>

                <button id="send-btn">
                    Enviar ➤
                </button>

            </div>

        </section>

    </main>

</div>


<!-- Scripts -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script src="{{ url_for('static', filename='js/index.js') }}"></script>

</body>
</html>
